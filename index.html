<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>zfargo</title>
<link rel="icon" href="/icon.png" type="image/png">
<link rel="icon" href="/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/favicon-180.png">
<meta name="description" content="zfargo.">
<style>
  :root{--bg:#0b1020;--bg2:#141d3d;--ink:#dce3f5;--dim:#8a97bd;--accent:#ffb84d}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden}
  body{
    background:radial-gradient(120% 90% at 50% -25%,#1b2750 0%,var(--bg2) 34%,var(--bg) 72%);
    color:var(--ink);
    font:15px/1.55 ui-monospace,"JetBrains Mono","Fira Code",monospace;
    display:flex;align-items:center;justify-content:center;
    padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
  }
  #sky{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{position:relative;z-index:1;text-align:center;line-height:1.2}
  h1{font-size:clamp(2.8rem,11vw,5.2rem);margin:0;font-weight:600;letter-spacing:.03em}
  h1 .dot{color:var(--accent)}
  .line{color:var(--dim);font-size:clamp(.72rem,2.6vw,.9rem);margin-top:.55em;letter-spacing:.02em;min-height:1.4em}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="wrap">
  <h1>zfargo<span class="dot">.</span></h1>
  <div class="line" id="line">&nbsp;</div>
</div>
<script src="/coast.js"></script>
<script>
(function(){
  "use strict";
  var cv=document.getElementById('sky'),ctx=cv.getContext('2d'),stars=[];
  // the front door now shows the coast's ACTUAL sky right now (Coast.sky, real
  // clock): deep-night stars, marine-layer blue-grey day, warm dawn/dusk band.
  // ?t=<hour 0..24> scrubs the day for a preview, same as the private pages.
  var pv=new URLSearchParams(location.search).get('t');
  var pvh=(pv!==null&&pv!=='')?parseFloat(pv):null; if(pvh!==null&&isNaN(pvh))pvh=null;
  function skyNow(){try{return Coast.sky(pvh!==null?pvh:undefined)}catch(e){return null}}
  function seedStars(){stars=[];var n=Math.round((cv.width*cv.height)/16000);
    for(var i=0;i<n;i++)stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height*.85,
      r:Math.random()*1.1+.2,a:Math.random()*.5+.2,t:Math.random()*6.28})}
  function paint(){var W=cv.width,H=cv.height,sk=skyNow();
    // sky gradient: zenith → mid → horizon, straight from Coast.sky()
    if(sk){var bg=ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,sk.top);bg.addColorStop(.55,sk.mid);bg.addColorStop(1,sk.horizon);
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);}
    else ctx.clearRect(0,0,W,H);
    // stars fade out as the sky brightens (gone by day)
    var dk=sk?sk.dark:1;
    if(dk>0.02)for(var i=0;i<stars.length;i++){var s=stars[i];ctx.globalAlpha=s.a*(.6+.4*Math.sin(s.t))*dk;
      ctx.fillStyle='#cdd8ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill()}
    ctx.globalAlpha=1;
    try{var m=Coast.day().moon,mx=W-Math.min(W*.18,120),my=Math.min(H*.2,120),mr=Math.min(W,H)*.055+16;
      // the moon pales in daylight — halo dims, disc goes a touch bluer
      var lit=sk?sk.light:0,glow=(.1+.12*m.illum)*(1-.7*lit);
      var g=ctx.createRadialGradient(mx,my,mr*.6,mx,my,mr*3.2);
      g.addColorStop(0,'rgba(255,240,205,'+glow+')');g.addColorStop(1,'rgba(255,240,205,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(mx,my,mr*3.2,0,6.283);ctx.fill();
      ctx.globalAlpha=1-.35*lit;
      ctx.fillStyle=lit>.5?'#e6ecf5':'#f3ecd6';ctx.beginPath();ctx.arc(mx,my,mr,0,6.283);ctx.fill();
      var off=Coast.crescent(m);ctx.save();ctx.beginPath();ctx.arc(mx,my,mr,0,6.283);ctx.clip();
      ctx.fillStyle=sk?sk.mid:'#0d1226';ctx.beginPath();ctx.arc(mx+off*mr,my,mr,0,6.283);ctx.fill();ctx.restore();
      ctx.globalAlpha=1;
    }catch(e){}}
  function resize(){cv.width=innerWidth;cv.height=innerHeight;seedStars();paint()}
  resize();addEventListener('resize',resize);
  var tw=0;setInterval(function(){for(var i=0;i<stars.length;i++)stars[i].t+=.03;if((tw++%2)===0)paint()},90);
  try{var sk=skyNow();document.getElementById('line').textContent=(sk?sk.phase+' · ':'')+Coast.line()}
  catch(e){document.getElementById('line').textContent='the coast at night'}
})();
</script>
</body>
</html>
