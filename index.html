<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>zfargo</title>
<link rel="icon" href="/icon.png" type="image/png">
<link rel="icon" href="/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/favicon-180.png">
<meta name="description" content="zfargo.">
<style>
  :root{
    --bg:#0b1020; --bg2:#141d3d; --ink:#dce3f5; --dim:#8a97bd;
    --accent:#ffb84d; --line:rgba(160,180,230,.14);
    --tile:rgba(150,170,225,.055); --tile-h:rgba(150,175,235,.11);
    --up:#5fd08a; --down:#ff6b5f; --idle:#5a6690;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:
      radial-gradient(120% 90% at 50% -25%, #1b2750 0%, var(--bg2) 34%, var(--bg) 72%);
    color:var(--ink);
    font:15px/1.55 ui-monospace,"JetBrains Mono","Fira Code",monospace;
    display:flex; flex-direction:column; min-height:100%;
    overflow:hidden;
  }
  /* the night: stars + moon painted behind everything */
  #sky{position:fixed; inset:0; z-index:0; pointer-events:none}
  .wrap{
    position:relative; z-index:1;
    flex:1 1 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:clamp(14px,3.2vh,30px);
    padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
    width:100%; max-width:920px; margin:0 auto;
  }
  header{text-align:center; line-height:1.2}
  h1{
    font-size:clamp(2.6rem,10vw,5rem); margin:0; font-weight:600; letter-spacing:.03em;
  }
  h1 .dot{color:var(--accent)}
  .line{color:var(--dim); font-size:clamp(.72rem,2.6vw,.9rem); margin-top:.5em; letter-spacing:.02em}

  /* doors */
  .grid{
    display:grid; gap:clamp(9px,1.6vh,14px); width:100%;
    grid-template-columns:repeat(4,1fr);
  }
  .grid.public{grid-template-columns:1fr; max-width:280px}
  a.door{
    position:relative; text-decoration:none; color:var(--ink);
    background:var(--tile); border:1px solid var(--line); border-radius:16px;
    padding:clamp(13px,2.4vh,20px) 16px; display:flex; flex-direction:column; gap:4px;
    transition:transform .14s ease, background .14s ease, border-color .14s ease;
    -webkit-tap-highlight-color:transparent;
  }
  a.door:hover{background:var(--tile-h); border-color:rgba(255,184,77,.4); transform:translateY(-2px)}
  a.door .nm{font-size:clamp(.95rem,2.6vw,1.05rem); font-weight:600; letter-spacing:.01em}
  a.door .ds{color:var(--dim); font-size:clamp(.64rem,2vw,.74rem)}
  a.door .dot{
    position:absolute; top:14px; right:14px; width:8px; height:8px; border-radius:50%;
    background:var(--idle); box-shadow:0 0 0 0 transparent; transition:background .3s, box-shadow .3s;
  }
  a.door .dot.up{background:var(--up); box-shadow:0 0 10px 1px rgba(95,208,138,.6)}
  a.door .dot.down{background:var(--down); box-shadow:0 0 10px 1px rgba(255,107,95,.6)}

  /* the wide door to the world */
  a.world{
    grid-column:1/-1; flex-direction:row; align-items:center; justify-content:space-between;
    background:linear-gradient(100deg, rgba(255,184,77,.10), rgba(150,175,235,.05));
    border-color:rgba(255,184,77,.28);
  }
  a.world .nm{font-size:clamp(1.05rem,3vw,1.25rem)}
  a.world .arrow{font-size:1.4rem; color:var(--accent); transition:transform .16s ease}
  a.world:hover .arrow{transform:translateX(5px)}

  footer{
    position:relative; z-index:1; text-align:center; color:var(--dim);
    font-size:.68rem; padding:0 18px max(14px,env(safe-area-inset-bottom)); letter-spacing:.02em;
    opacity:.75;
  }
  footer a{color:var(--dim)}
  .lamp{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--idle);
    vertical-align:middle; margin-right:5px; transition:background .3s}
  .lamp.up{background:var(--up)} .lamp.down{background:var(--down)}

  /* mode visibility */
  body[data-mode="public"] .private-only{display:none}
  body[data-mode="private"] .public-only{display:none}
  .public-only .line{margin-top:1.4em}

  @media (max-width:620px){
    .grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body data-mode="public">
<canvas id="sky"></canvas>

<div class="wrap">
  <header>
    <h1>zfargo<span class="dot">.</span></h1>
    <div class="line" id="line">&nbsp;</div>
  </header>

  <!-- PUBLIC: one clean way in -->
  <div class="grid public public-only">
    <a class="door" href="https://auth.zfargo.com">
      <span class="nm">sign in</span>
      <span class="ds">enter through the door</span>
    </a>
  </div>

  <!-- PRIVATE: the full console, revealed on the tailnet -->
  <div class="grid private-only" id="doors">
    <a class="door" href="https://drive.zfargo.com" data-svc="ocis">
      <span class="dot"></span><span class="nm">drive</span><span class="ds">files · office</span>
    </a>
    <a class="door" href="https://zulip.zfargo.com" data-svc="docker-zulip-zulip-1">
      <span class="dot"></span><span class="nm">chat</span><span class="ds">zulip</span>
    </a>
    <a class="door" href="https://recipes.zfargo.com/">
      <span class="nm">recipes</span><span class="ds">worth cooking twice</span>
    </a>
    <a class="door" href="https://auth.zfargo.com" data-svc="authentik-server-1">
      <span class="dot"></span><span class="nm">sign in</span><span class="ds">single sign-on</span>
    </a>
    <a class="door world" href="https://crabland.zfargo.com">
      <span><span class="nm">enter crabland</span> <span class="ds">— the coast, the machine, the whole world</span></span>
      <span class="arrow">&rarr;</span>
    </a>
  </div>
</div>

<footer>
  <span class="private-only"><span class="lamp" id="lamp"></span><span id="health">crabland</span> &middot; </span>
  <span id="foot">a quiet harbor on the tailnet</span>
</footer>

<script src="/coast.js"></script>
<script>
(function(){
  "use strict";
  var body = document.body;

  /* ---- the night behind everything ---- */
  var cv = document.getElementById('sky'), ctx = cv.getContext('2d'), stars = [];
  function seedStars(){
    stars = [];
    var n = Math.round((cv.width*cv.height)/16000);
    for(var i=0;i<n;i++) stars.push({x:Math.random()*cv.width, y:Math.random()*cv.height*0.85,
      r:Math.random()*1.1+0.2, a:Math.random()*0.5+0.2, t:Math.random()*6.28});
  }
  function paint(){
    var W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    // stars
    for(var i=0;i<stars.length;i++){var s=stars[i];
      ctx.globalAlpha=s.a*(0.6+0.4*Math.sin(s.t)); ctx.fillStyle='#cdd8ff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.283); ctx.fill();}
    ctx.globalAlpha=1;
    // moon, upper-right, drawn from the shared sky
    try{
      var day = Coast.day(), m = day.moon;
      var mx=W-Math.min(W*0.18,120), my=Math.min(H*0.2,120), mr=Math.min(W,H)*0.055+16;
      // glow
      var g=ctx.createRadialGradient(mx,my,mr*0.6,mx,my,mr*3.2);
      g.addColorStop(0,'rgba(255,240,205,'+(0.10+0.12*m.illum)+')'); g.addColorStop(1,'rgba(255,240,205,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(mx,my,mr*3.2,0,6.283); ctx.fill();
      // disc
      ctx.fillStyle='#f3ecd6'; ctx.beginPath(); ctx.arc(mx,my,mr,0,6.283); ctx.fill();
      // shadow (terminator) from Coast.crescent, clipped to the disc
      var off = Coast.crescent(m);
      ctx.save();
      ctx.beginPath(); ctx.arc(mx,my,mr,0,6.283); ctx.clip();
      ctx.fillStyle='#0d1226';
      ctx.beginPath(); ctx.arc(mx+off*mr,my,mr,0,6.283); ctx.fill();
      ctx.restore();
    }catch(e){}
  }
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; seedStars(); paint(); }
  resize(); addEventListener('resize',resize);
  var tw=0; setInterval(function(){ for(var i=0;i<stars.length;i++) stars[i].t+=0.03; if((tw++%2)===0) paint(); }, 90);

  /* ---- tonight's keeper line (works everywhere, date-seeded) ---- */
  try{ document.getElementById('line').textContent = Coast.line(); }catch(e){
    document.getElementById('line').textContent = 'the coast at night';
  }

  /* ---- public -> private: probe the tailnet, upgrade if we're inside ---- */
  var CRAB = 'https://crabland.zfargo.com';
  function goPrivate(status){
    body.setAttribute('data-mode','private');
    var lamp=document.getElementById('lamp'), health=document.getElementById('health');
    if(status && status.docker){
      var up={}, allUp=true;
      status.docker.forEach(function(d){ up[d.name]=d.up; if(!d.up) allUp=false; });
      document.querySelectorAll('#doors [data-svc]').forEach(function(a){
        var dot=a.querySelector('.dot'); if(!dot) return;
        var svc=a.getAttribute('data-svc');
        if(up[svc]===false) dot.classList.add('down');
        else if(up[svc]) dot.classList.add('up');
      });
      lamp.classList.add(allUp?'up':'down');
      health.textContent = allUp ? 'crabland · all lit' : 'crabland · check the lighthouse';
    }else{
      lamp.classList.add('up'); health.textContent='crabland';
    }
    document.getElementById('foot').textContent = 'you’re on the tailnet';
  }

  // 1) quick reachability probe (opaque, no CORS needed) with a timeout
  var reached=false;
  var probe = fetch(CRAB+'/status.json', {mode:'no-cors', cache:'no-store'})
    .then(function(){ reached=true; return true; }).catch(function(){ return false; });
  var timeout = new Promise(function(r){ setTimeout(function(){ r(false); }, 2500); });

  Promise.race([probe, timeout]).then(function(ok){
    if(!ok && !reached) return;               // stay public
    // 2) we're inside -- try to read live status for the dots (needs CORS header)
    fetch(CRAB+'/status.json', {cache:'no-store'})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){ goPrivate(j); })
      .catch(function(){ goPrivate(null); });   // reachable but not readable -> doors on, no dots
  });
})();
</script>
</body>
</html>
