<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zfargo</title>
<style>
  :root { --bg: #0b1020; --text: #dce3f5; --accent: #ffb84d; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 800px at 50% -20%, #18234a 0%, var(--bg) 60%);
    color: var(--text);
    font: 16px/1.6 ui-monospace, "JetBrains Mono", "Fira Code", monospace;
    display: flex; align-items: center; justify-content: center;
  }
  h1 {
    font-size: clamp(2.4rem, 9vw, 4.5rem);
    margin: 0; letter-spacing: .04em; font-weight: 600;
  }
  h1 .dot { color: var(--accent); }
</style>
</head>
<body>
  <h1>zfargo<span class="dot">.</span></h1>
</body>
</html>
