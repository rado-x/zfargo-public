<!DOCTYPE html><html><head><title>start</title></head><body>
<script>
var t0=performance.now();
var img=new Image();
img.onload=function(){document.title='IMG-OK '+Math.round(performance.now()-t0)+'ms';};
img.onerror=function(){document.title='IMG-ERR '+Math.round(performance.now()-t0)+'ms';};
img.src='https://crabland.zfargo.com/assets/brand/favicon-32.png?cb='+Math.random();
</script></body></html>
